app:
  name: article-api
  env: development

server:
  host: 0.0.0.0
  port: 8080

database:
  driver: mysql
  host: host.docker.internal
  port: 3306
  name: article_db
  user: appuser
  password: AppPass123!
  charset: utf8mb4
  parse_time: true
  loc: Local

cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Authorization
    - ngrok-skip-browser-warning

redis:
  addr: "redis-cache:6379"
